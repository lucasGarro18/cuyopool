<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 96" width="380" height="96" fill="none" role="img" aria-label="Cuyo Pool — por Piscinas Cuyo">
  <!-- Emblema: gota + ondas concéntricas (agua) -->
  <g stroke="#cfe9e8" stroke-width="1.6" fill="none">
    <circle cx="48" cy="48" r="30" stroke-opacity="0.25"/>
    <circle cx="48" cy="48" r="21" stroke-opacity="0.45"/>
    <circle cx="48" cy="48" r="12" stroke-opacity="0.7"/>
  </g>
  <!-- Gota central -->
  <path d="M48 32 C53 40 57 44 57 50 a9 9 0 1 1 -18 0 c0 -6 4 -10 9 -18 Z"
        fill="#cfe9e8" fill-opacity="0.92"/>
  <!-- Wordmark -->
  <text x="92" y="44"
        font-family="'Cormorant Garamond','Times New Roman',serif"
        font-style="italic" font-weight="500" font-size="42"
        letter-spacing="0.5" fill="#eaf6f7">Cuyo <tspan fill="#cfe9e8">Pool</tspan></text>
  <!-- Tagline / sello de trayectoria -->
  <text x="94" y="70"
        font-family="'Inter Tight',system-ui,sans-serif"
        font-weight="500" font-size="9.5" letter-spacing="3.2"
        fill="#e0c79a">POR PISCINAS CUYO · EST. 1995</text>
</svg>
